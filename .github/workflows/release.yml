name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            arch_name: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-14
            arch_name: aarch64-darwin
            cli_only: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build server (linux only)
        if: ${{ !matrix.cli_only }}
        run: cargo build --release --target ${{ matrix.target }} -p azcluster-server
      - name: Build cli
        run: cargo build --release --target ${{ matrix.target }} -p azcluster-cli
      - name: Package artifacts
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch_name }}"
          mkdir -p dist

          if [ "${{ matrix.cli_only }}" != "true" ]; then
            tar -czf "dist/azcluster-server-${VERSION}-${ARCH}.tar.gz" \
              -C target/${{ matrix.target }}/release azcluster-server
          fi

          tar -czf "dist/azcluster-cli-${VERSION}-${ARCH}.tar.gz" \
            -C target/${{ matrix.target }}/release azcluster
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch_name }}
          path: dist/

  assets:
    name: Package static assets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Package assets tarball
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist staging/assets
          for d in scripts config cloud-init bicep; do
            if [ -d "$d" ]; then
              cp -r "$d" staging/assets/
            fi
          done
          tar -czf "dist/azcluster-assets-${VERSION}.tar.gz" -C staging assets
      - uses: actions/upload-artifact@v4
        with:
          name: dist-assets
          path: dist/

  release:
    name: Publish release
    needs: [build, assets]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
