name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            arch_name: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-14
            arch_name: aarch64-darwin
            cli_only: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build server (linux only)
        if: ${{ !matrix.cli_only }}
        run: cargo build --release --target ${{ matrix.target }} -p azcluster-server
      - name: Build azhealthcheck (linux only)
        if: ${{ !matrix.cli_only }}
        run: cargo build --release --target ${{ matrix.target }} -p azhealthcheck
      - name: Build cli
        run: cargo build --release --target ${{ matrix.target }} -p azcluster-cli
      - name: Package artifacts
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch_name }}"
          mkdir -p dist

          if [ "${{ matrix.cli_only }}" != "true" ]; then
            tar -czf "dist/azcluster-server-${VERSION}-${ARCH}.tar.gz" \
              -C target/${{ matrix.target }}/release azcluster-server
            tar -czf "dist/azhealthcheck-${VERSION}-${ARCH}.tar.gz" \
              -C target/${{ matrix.target }}/release azhealthcheck
          fi

          tar -czf "dist/azcluster-cli-${VERSION}-${ARCH}.tar.gz" \
            -C target/${{ matrix.target }}/release azcluster
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch_name }}
          path: dist/

  assets:
    name: Package static assets
    runs-on: ubuntu-24.04
    env:
      BICEP_VERSION: 'v0.30.23'
    steps:
      - uses: actions/checkout@v4
      - name: Install bicep CLI (standalone, no az)
        run: |
          set -e
          curl -fsSL -o /tmp/bicep \
            "https://github.com/Azure/bicep/releases/download/${BICEP_VERSION}/bicep-linux-x64"
          chmod +x /tmp/bicep
          sudo mv /tmp/bicep /usr/local/bin/bicep
          bicep --version
      - name: Transpile bicep -> ARM JSON
        run: |
          set -e
          mkdir -p bicep
          bicep build bicep/main.bicep --outfile bicep/main.json
          test -s bicep/main.json
          echo "==> main.json: $(wc -c < bicep/main.json) bytes"
      - name: Package assets tarball
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist staging/assets
          for d in scripts config cloud-init bicep; do
            if [ -d "$d" ]; then
              cp -r "$d" staging/assets/
            fi
          done
          tar -czf "dist/azcluster-assets-${VERSION}.tar.gz" -C staging assets
          cp bicep/main.json "dist/azcluster-main-${VERSION}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-assets
          path: dist/

  pyxis:
    name: Build spank_pyxis.so
    runs-on: ubuntu-24.04
    env:
      PYXIS_VERSION: '0.21.0'
    steps:
      - name: Add Microsoft Slurm apt repo
        run: |
          set -e
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          ARCH=$(dpkg --print-architecture)
          CODENAME=$(. /etc/os-release; echo "${VERSION_CODENAME}")
          echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/repos/slurm-ubuntu-${CODENAME} stable main" | sudo tee /etc/apt/sources.list.d/slurm.list
          sudo apt-get update
      - name: Install build deps
        run: |
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcap-dev \
            libtool \
            automake \
            libmd-dev \
            slurm-smd-dev
      - name: Fetch + build pyxis
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          curl -fsSL -o pyxis.tar.gz "https://github.com/NVIDIA/pyxis/archive/refs/tags/v${PYXIS_VERSION}.tar.gz"
          tar -xzf pyxis.tar.gz
          cd "pyxis-${PYXIS_VERSION}"
          make
          mkdir -p ../dist
          install -m 0644 spank_pyxis.so "../dist/spank_pyxis-${VERSION}-x86_64-linux.so"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pyxis
          path: dist/

  release:
    name: Publish release
    needs: [build, assets, pyxis]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz *.so > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.so
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
