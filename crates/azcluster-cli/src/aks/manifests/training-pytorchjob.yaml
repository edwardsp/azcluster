apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: azcluster-llama-train
  namespace: default
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: Never
      template:
        spec:
          containers:
            - name: pytorch
              image: nvcr.io/nvidia/nemo:26.04.00
              securityContext:
                capabilities:
                  add: ["IPC_LOCK"]
              env:
                - { name: NCCL_DEBUG, value: "WARN" }
                - { name: NCCL_SOCKET_IFNAME, value: "eth0" }
                - { name: NCCL_IB_PCI_RELAXED_ORDERING, value: "1" }
                - { name: NCCL_MIN_NCHANNELS, value: "32" }
                - { name: NCCL_P2P_NET_CHUNKSIZE, value: "524288" }
                - { name: NCCL_COLLNET_ENABLE, value: "1" }
                - { name: TRAIN_ITERS, value: "{{TRAIN_ITERS}}" }
                - { name: GBS, value: "{{GBS}}" }
                - { name: MBS, value: "1" }
                - { name: CP, value: "{{CP}}" }
              command: ["bash", "-c"]
              args:
                - 'torchrun --nnodes=$WORLD_SIZE --node_rank=$RANK --nproc_per_node=8 --master_addr=$MASTER_ADDR --master_port=$MASTER_PORT /scripts/pretrain.py'
              resources:
                limits:
                  nvidia.com/gpu: 8
                  rdma/ib: 8
              volumeMounts:
                - { name: shm, mountPath: /dev/shm }
                - { name: scripts, mountPath: /scripts }
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
            - name: scripts
              configMap:
                name: azcluster-llama-pretrain
    Worker:
      replicas: {{WORKER_REPLICAS}}
      restartPolicy: Never
      template:
        spec:
          containers:
            - name: pytorch
              image: nvcr.io/nvidia/nemo:26.04.00
              securityContext:
                capabilities:
                  add: ["IPC_LOCK"]
              env:
                - { name: NCCL_DEBUG, value: "WARN" }
                - { name: NCCL_SOCKET_IFNAME, value: "eth0" }
                - { name: NCCL_IB_PCI_RELAXED_ORDERING, value: "1" }
                - { name: NCCL_MIN_NCHANNELS, value: "32" }
                - { name: NCCL_P2P_NET_CHUNKSIZE, value: "524288" }
                - { name: NCCL_COLLNET_ENABLE, value: "1" }
                - { name: TRAIN_ITERS, value: "{{TRAIN_ITERS}}" }
                - { name: GBS, value: "{{GBS}}" }
                - { name: MBS, value: "1" }
                - { name: CP, value: "{{CP}}" }
              command: ["bash", "-c"]
              args:
                - 'torchrun --nnodes=$WORLD_SIZE --node_rank=$RANK --nproc_per_node=8 --master_addr=$MASTER_ADDR --master_port=$MASTER_PORT /scripts/pretrain.py'
              resources:
                limits:
                  nvidia.com/gpu: 8
                  rdma/ib: 8
              volumeMounts:
                - { name: shm, mountPath: /dev/shm }
                - { name: scripts, mountPath: /scripts }
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
            - name: scripts
              configMap:
                name: azcluster-llama-pretrain
