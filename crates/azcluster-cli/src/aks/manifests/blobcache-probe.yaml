apiVersion: v1
kind: ConfigMap
metadata:
  name: blobcache-probe-config
  namespace: default
data:
  blobcached.toml: |
    [cache]
    dir = "/cache"
    max_bytes = {{CACHE_MAX_BYTES}}
    chunk_size = 4194304

    [azure]
    workers = 8
    block_size = 16777216

    [cluster]
    bind = "0.0.0.0:7771"
    seeds = []

    [transport]
    kind = "tcp"
    bind = "0.0.0.0:7772"

    [stats]
    bind = "0.0.0.0:7773"

    [[mounts]]
    name = "data"
    mountpoint = "/mnt/blobcache/data"
    account = "{{STORAGE_ACCOUNT}}"
    container = "{{CONTAINER}}"
    prefix = "{{PREFIX}}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: blobcache-probe
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        agentpool: gpu
      tolerations:
        - operator: Exists
      initContainers:
        - name: blobcached
          image: ghcr.io/edwardsp/blobcache:v2.9.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN", "IPC_LOCK"]
          env:
            - { name: RUST_LOG, value: "info" }
            - { name: AZURE_CLIENT_ID, value: "{{MI_CLIENT_ID}}" }
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - { name: cache, mountPath: /cache }
            - name: fusemount
              mountPath: /mnt/blobcache
              mountPropagation: Bidirectional
            - name: config
              mountPath: /etc/blobcached.toml
              subPath: blobcached.toml
              readOnly: true
          startupProbe:
            httpGet:
              path: /healthz
              port: 7773
            periodSeconds: 5
            failureThreshold: 60
      containers:
        - name: probe
          image: ghcr.io/edwardsp/blobcache:v2.9.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eu
              echo "=== waiting for blobcached stats endpoint ==="
              for i in $(seq 1 60); do
                curl -fsS http://127.0.0.1:7773/healthz >/dev/null 2>&1 && break
                sleep 2
              done
              echo "=== FUSE mount visible? ==="
              for i in $(seq 1 30); do
                mountpoint -q /mnt/blobcache/data && break || true
                ls /mnt/blobcache/data >/dev/null 2>&1 && break
                sleep 2
              done
              echo "=== hydrate {{PREFIX}} ==="
              resp=$(curl -fsS -XPOST http://127.0.0.1:7773/hydrate \
                -H 'content-type: application/json' \
                -d '{"mount":"data","path":"{{PREFIX}}","recursive":true}')
              echo "hydrate response: $resp"
              id=$(printf '%s' "$resp" | sed -n 's/.*"id"[: ]*"\([^"]*\)".*/\1/p')
              echo "hydrate job id: ${id:-<none>}"
              for i in $(seq 1 120); do
                st=$(curl -fsS "http://127.0.0.1:7773/hydrate/${id}" 2>/dev/null || true)
                echo "poll $i: $st"
                printf '%s' "$st" | grep -qiE '"(state|status)"[: ]*"(done|completed|finished|complete)"' && break
                sleep 5
              done
              echo "=== mount listing ==="
              ls -laR /mnt/blobcache/data 2>&1 | head -40
              echo "=== stats ==="
              curl -fsS http://127.0.0.1:7773/stats 2>/dev/null | head -40 || true
              echo "BLOBCACHE_PROBE_OK"
          volumeMounts:
            - name: fusemount
              mountPath: /mnt/blobcache
              mountPropagation: HostToContainer
      volumes:
        - name: cache
          ephemeral:
            volumeClaimTemplate:
              metadata:
                annotations:
                  localdisk.csi.acstor.io/accept-ephemeral-storage: "true"
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: local-csi
                resources:
                  requests:
                    storage: {{CACHE_GIB}}Gi
        - name: fusemount
          emptyDir: {}
        - name: config
          configMap:
            name: blobcache-probe-config
