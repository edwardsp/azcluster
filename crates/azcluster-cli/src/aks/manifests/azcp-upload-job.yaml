apiVersion: batch/v1
kind: Job
metadata:
  name: azcp-upload
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        agentpool: gpu
      tolerations:
        - operator: Exists
      containers:
        - name: azcp
          image: ghcr.io/edwardsp/azcp/azcp-cluster:v0.4.3
          imagePullPolicy: IfNotPresent
          env:
            - { name: AZURE_CLIENT_ID, value: "{{MI_CLIENT_ID}}" }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -xeuo pipefail
              mkdir -p /scratch/upload
              {{PREP_CMD}}
              azcp copy /scratch/upload/ "{{BLOB_DEST_URL}}" \
                --recursive --workers 4 --concurrency 32 --block-size 16777216
              echo "AZCP_UPLOAD_OK"
          volumeMounts:
            - { name: scratch, mountPath: /scratch }
      volumes:
        - name: scratch
          ephemeral:
            volumeClaimTemplate:
              metadata:
                annotations:
                  localdisk.csi.acstor.io/accept-ephemeral-storage: "true"
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: local-csi
                resources:
                  requests:
                    storage: {{CACHE_GIB}}Gi
